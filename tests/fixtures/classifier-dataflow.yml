# Classifier pipeline — threshold classifier dataflow.
#
# test-source emits Int64 values → classifier splits by threshold (50)
# into "high" and "low" outputs → two test-sink instances compare against
# expected high/low values.
#
# Usage:
#   dora run tests/fixtures/classifier-dataflow.yml --stop-after 15s

nodes:
  - id: test-source
    path: ../../target/debug/test-source
    args: "--output raw-data:classifier-source.json"
    outputs:
      - raw-data

  - id: classifier
    path: ../../target/debug/classifier-node
    inputs:
      raw-data: test-source/raw-data
    outputs:
      - high
      - low

  - id: test-sink-high
    path: ../../target/debug/test-sink
    inputs:
      high: classifier/high
    args: "--expected-file classifier-expected-high.json --output-file result-high.json"

  - id: test-sink-low
    path: ../../target/debug/test-sink
    inputs:
      low: classifier/low
    args: "--expected-file classifier-expected-low.json --output-file result-low.json"
