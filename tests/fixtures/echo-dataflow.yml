# Echo pipeline — demo dataflow for test-source → echo-node → test-sink.
#
# Usage (from crate root, after cargo build):
#   cargo build --bin test_source --bin test-sink --bin echo-node
#   dora/target/debug/dora run tests/fixtures/echo-dataflow.yml --stop-after 10s
#   cat result.json
#
# The pipeline:
#   1. test-source reads source-data.json and emits three Int64 values
#   2. echo-node echoes each input back as an output
#   3. test-sink captures outputs, compares with expected-output.json, writes result.json

nodes:
  - id: test-source
    path: ../../target/debug/test_source
    args: "--output-id data --data-file source-data.json"
    outputs:
      - data

  - id: echo-node
    path: ../../target/debug/echo-node
    inputs:
      data: test-source/data
    outputs:
      - data

  - id: test-sink
    path: ../../target/debug/test-sink
    inputs:
      data: echo-node/data
    args: "--expected-file expected-output.json --output-file result.json"
